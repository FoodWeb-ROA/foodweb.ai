name: Deploy foodweb.ai

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a newer push to main arrives so we don't race deploys.
concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: imperial-rarity-442220-c9
  GCP_REGION: europe-west1

jobs:
  tsc:
    name: Typecheck (tsc + astro check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn astro sync
      - run: npx tsc --noEmit
      - run: yarn astro check

  pyright:
    name: Typecheck (pyright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - uses: jakebailey/pyright-action@v2
        with:
          working-directory: backend

  backend:
    name: Deploy foodweb-ai backend → Cloud Run
    needs: [tsc, pyright]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.FOODWEB_AI_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # `--service-account` + `--default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET`
      # makes the build run as the foodweb-ai SA and stage source in a per-region
      # user-owned bucket. This avoids the legacy `<project>_cloudbuild` bucket
      # (which requires serviceusage.services.use on the invoking principal —
      # granting storage.objectUser on the bucket alone isn't enough).
      - name: Submit Cloud Build
        working-directory: backend
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --service-account=projects/${{ env.GCP_PROJECT_ID }}/serviceAccounts/${{ secrets.FOODWEB_AI_SA }} \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET \
            --substitutions=_RECAPTCHA_SITE_KEY="${{ secrets.RECAPTCHA_SITE_KEY }}" \
            .

  hosting:
    name: Build & deploy Astro → Firebase Hosting
    runs-on: ubuntu-latest
    needs: [tsc, pyright, backend]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.FOODWEB_AI_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - run: yarn install --frozen-lockfile

      # Notion → src/content/blog/*.mdx. Must run before `yarn build` so Astro
      # sees the fresh content. Notion is the source of truth — anything not
      # in the DB gets pruned locally.
      - name: Sync blog posts from Notion
        working-directory: backend
        env:
          NOTION_TOKEN: ${{ secrets.FOODWEB_AI_NOTION_TOKEN }}
          NOTION_BLOG_DATABASE_ID: 07926233-654b-4086-998f-40e21366a5ba
        run: |
          pip install --quiet -r requirements.txt
          python -m app.blog_sync

      - name: Build Astro
        env:
          PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
        run: yarn build

      # Uses ADC from google-github-actions/auth above — no JSON key needed.
      # firebase.json pins the hosting site (`foodweb-ai`); --project targets
      # the parent Firebase/GCP project.
      - name: Deploy to Firebase Hosting
        run: npx --yes firebase-tools@latest deploy --only hosting --project ${{ env.GCP_PROJECT_ID }} --non-interactive
