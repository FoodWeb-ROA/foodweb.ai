# Cloud Build configuration for the foodweb.ai backend.
# Thin Cloud Run service: contact form ingest + blog post sync from Notion.
# Single environment — the website doesn't have staging/prod branches.
substitutions:
  _REGION: "europe-west1"
  _REPOSITORY: "foodweb-ai"
  _SERVICE_NAME: "foodweb-ai"
  _IMAGE_TAG: "latest"
  _PROJECT_ID: "imperial-rarity-442220-c9"
  _SERVICE_ACCOUNT: "foodweb-ai@imperial-rarity-442220-c9.iam.gserviceaccount.com"
  _MAX_INSTANCES: "2"

  # Static config — both DBs live in OPS / Growth & Marketing.
  _NOTION_CONTACT_DATABASE_ID: "30677f06-0325-4fad-a110-82c26bf6a1fb"
  _NOTION_BLOG_DATABASE_ID: "07926233-654b-4086-998f-40e21366a5ba"
  _CORS_ALLOWED_ORIGINS: "https://foodweb.ai,https://www.foodweb.ai"

  # reCAPTCHA key lives in this project; verification authenticates as the Cloud
  # Run SA (needs roles/recaptchaenterprise.agent). _RECAPTCHA_SITE_KEY is passed
  # in from deploy.yml so the value isn't committed.
  _RECAPTCHA_PROJECT_ID: "imperial-rarity-442220-c9"
  _RECAPTCHA_SITE_KEY: ""

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "setup-buildx"
    args: ["buildx", "create", "--use", "--name=builder"]

  - name: "gcr.io/cloud-builders/docker"
    id: "pull-cache-image"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker pull ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest || true

  - name: "gcr.io/cloud-builders/docker"
    id: "build-push-image"
    args:
      [
        "buildx",
        "build",
        "-f",
        "Dockerfile",
        "--platform",
        "linux/amd64",
        "-t",
        "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}",
        "--cache-from",
        "type=registry,ref=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest",
        "--cache-to",
        "type=inline",
        "--progress=plain",
        "--push",
        "./",
      ]
    env:
      - "DOCKER_BUILDKIT=1"
    waitFor: ["setup-buildx"]

  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        gcloud run deploy ${_SERVICE_NAME} \
          --image ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --max-instances ${_MAX_INSTANCES} \
          --concurrency 40 \
          --set-env-vars "^@^NOTION_CONTACT_DATABASE_ID=${_NOTION_CONTACT_DATABASE_ID}@NOTION_BLOG_DATABASE_ID=${_NOTION_BLOG_DATABASE_ID}@CORS_ALLOWED_ORIGINS=${_CORS_ALLOWED_ORIGINS}@RECAPTCHA_PROJECT_ID=${_RECAPTCHA_PROJECT_ID}@RECAPTCHA_SITE_KEY=${_RECAPTCHA_SITE_KEY}@ENVIRONMENT=production" \
          --set-secrets "NOTION_TOKEN=foodweb_ai_notion_token:latest,SENTRY_DSN=foodweb_ai_backend_sentry_dsn:latest,BLOG_WEBHOOK_SECRET=foodweb_ai_blog_webhook_secret:latest,GITHUB_DISPATCH_TOKEN=foodweb_ai_github_dispatch_token:latest" \
          --service-account ${_SERVICE_ACCOUNT} \
          --timeout 30s \
          --memory 256Mi \
          --cpu 1 \
          --min-instances 0

options:
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"


timeout: "900s"
